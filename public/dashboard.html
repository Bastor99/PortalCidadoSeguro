<!DOCTYPE html>
<html>
<head>
<title>Portal do Cidadão</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="user-page">

<div class="container">

<h2>Portal do Cidadão</h2>

<p>Bem-vindo ao portal de serviços municipais.</p>



<div class="cards">

<div class="card">
<h3>Tributos</h3>
<p>Emitir e consultar boletos municipais.</p>
<button onclick="acaoTributos()">Consultar</button>
</div>

<div class="card">
<h3>Solicitações</h3>
<p>Acompanhe suas solicitações abertas.</p>
<button onclick="acaoSolicitacoes()">Acessar</button>
</div>

<div class="card">
<h3>Enviar Documentos</h3>
<p>Envie documentos para análise.</p>
<button onclick="acaoDocumentos()">Enviar</button>
</div>

</div>

</div>

<script src="script.js"></script>

<script>
function acaoTributos(){
  showToast('info','Funcionalidade indisponível (demo)');
  logEvent("Usuário clicou em Tributos");
}

function acaoSolicitacoes(){
  showToast('info','Listando solicitações');
  logEvent("Usuário acessou Solicitações");
}

function acaoDocumentos(){
  showToast('info','Envio iniciado');
  logEvent("Usuário iniciou envio de documentos");
}
</script>

</body>
</html>
