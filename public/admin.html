<!DOCTYPE html>
<html>
<head>
<title>Painel Administrativo</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="admin-page">

<div class="container">

<h2>Painel Administrativo</h2>

<p>Área restrita para servidores públicos.</p>

<h3>Solicitações recentes</h3>

<table>

<tr>
<th>ID</th>
<th>Cidadão</th>
<th>Status</th>
<th>Ação</th>
</tr>

<tr>
<td>101</td>
<td>João Silva</td>
<td>Pendente</td>
<td><button onclick="showToast('success','Solicitação aprovada')">Aprovar</button></td>
</tr>

<tr>
<td>102</td>
<td>Maria Souza</td>
<td>Em análise</td>
<td><button onclick="showToast('info','Visualizando solicitação')">Visualizar</button></td>
</tr>

</table>

<h3>Logs de Auditoria</h3>

<table id="logTable">

<tr>
<th>Data</th>
<th>Evento</th>
</tr>

</table>

<button onclick="carregarLogs()">Atualizar Logs</button>

<script src="script.js"></script>
<script>
if(localStorage.getItem("role") !== "admin"){
  showToast('error', 'Acesso negado');
  setTimeout(() => { window.location = "index.html"; }, 900);
}

async function carregarLogs(){
  try {
    const response = await fetch("/logs");
    if(!response.ok) throw new Error('Falha');
    const logs = await response.json();

    const table = document.getElementById("logTable");

    table.innerHTML = `
    <tr>
    <th>Data</th>
    <th>Evento</th>
    </tr>
    `;

    logs.reverse().forEach(log => {

      const row = document.createElement("tr");

      row.innerHTML = `<td>${log.date}</td><td>${log.message}</td>`;

      table.appendChild(row);

    });

    showToast('success', 'Logs atualizados');

  } catch (e) {
    showToast('error', 'Falha ao carregar logs');
  }

}

carregarLogs();
</script>

</body>
</html>
