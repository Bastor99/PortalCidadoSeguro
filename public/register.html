<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h2>Crie sua conta</h2>

    <input id="reg-user" placeholder="Usuário">
    <input id="reg-pass" type="password" placeholder="Senha">
    <input id="reg-pass-confirm" type="password" placeholder="Confirmar senha">

    <button onclick="register()">Cadastrar</button>

    <p id="reg-msg"></p>

    <p style="text-align:center;margin-top:12px;"><a href="login.html">Já tem conta? Entrar</a></p>

    <script src="script.js"></script>
  </div>
</body>
</html>
